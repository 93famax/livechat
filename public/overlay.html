<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>LiveChat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1920px;
  height: 1080px;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', Arial, sans-serif;
}
#lc-wrap {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 780px;
  z-index: 100;
  pointer-events: none;
}
#lc-wrap.text-mode {
  bottom: 80px;
  top: auto;
  transform: translateX(-50%);
  text-align: center;
}
#lc-card {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 50px rgba(0,0,0,0.85), 0 0 0 1.5px rgba(255,255,255,0.08);
  opacity: 0;
  transform: translateY(20px) scale(0.97);
  transition: opacity 0.3s cubic-bezier(0.34,1.56,0.64,1), transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#lc-card.show { opacity:1; transform:translateY(0) scale(1); }
#lc-card.hide { opacity:0; transform:translateY(-12px) scale(0.97); transition: opacity 0.25s ease, transform 0.25s ease; }

#lc-media {
  width: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  border-radius: 16px 16px 0 0;
  overflow: hidden;
}
#lc-media.hidden { display: none; }
#lc-media.rounded { border-radius: 16px; }
#lc-media img, #lc-media video { width:100%; max-height:520px; object-fit:contain; display:block; }

.author-bar {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  border-radius: 50px;
  padding: 5px 14px 5px 5px;
}
.author-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.25);
  object-fit: cover;
  flex-shrink: 0;
  background: linear-gradient(135deg,#9147ff,#ff6b9d);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 900;
  color: white;
  overflow: hidden;
}
.author-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.author-name { font-size: 13px; font-weight: 700; color: white; }

#lc-audio {
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(10,10,15,0.92);
  border-radius: 16px;
}
#lc-audio.hidden { display: none; }
.audio-icon { font-size: 28px; animation: beat 0.6s ease-in-out infinite alternate; }
@keyframes beat { from{transform:scale(1)} to{transform:scale(1.18)} }
.audio-bar { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.audio-bar-fill { height:100%; background:linear-gradient(90deg,#9147ff,#ff6b9d); border-radius:4px; animation:wave 1.8s ease-in-out infinite; }
@keyframes wave { 0%{width:15%} 50%{width:85%} 100%{width:15%} }
.audio-name { font-size:13px; font-weight:700; color:rgba(255,255,255,0.7); }

#lc-caption {
  padding: 10px 4px 0px;
  background: transparent;
  border-radius: 0;
}
#lc-caption.hidden { display: none; }
#lc-caption.standalone {
  background: transparent;
  border-radius: 0;
  padding: 0;
  text-align: center;
  width: 100%;
}
.cap-author { font-size: 12px; font-weight: 700; color: #9147ff; margin-bottom: 5px; }
.cap-text {
  font-size: 26px;
  font-weight: 900;
  color: #fff;
  line-height: 1.35;
  word-break: break-word;
}
#lc-caption.standalone .cap-author { display: none; }
#lc-caption.standalone .cap-text {
  font-size: 42px;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div id="lc-wrap">
  <div id="lc-card">
    <div id="lc-audio" class="hidden">
      <div class="audio-icon">🎵</div>
      <div class="audio-bar"><div class="audio-bar-fill"></div></div>
      <div class="audio-name" id="lc-audio-name"></div>
    </div>
    <div id="lc-media" class="hidden"></div>
    <div id="lc-caption" class="hidden">
      <div class="cap-author" id="cap-author"></div>
      <div class="cap-text" id="cap-text"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const myName = params.get('name') || 'stream';

const card      = document.getElementById('lc-card');
const mediaEl   = document.getElementById('lc-media');
const audioEl   = document.getElementById('lc-audio');
const captionEl = document.getElementById('lc-caption');
const capAuthor = document.getElementById('cap-author');
const capText   = document.getElementById('cap-text');
const audioName = document.getElementById('lc-audio-name');

let currentAudio = null;

const socket = io();
socket.on('connect', () => socket.emit('register', myName));
socket.on('livechat', showLiveChat);
socket.on('skip', () => hideCard());

function showLiveChat(data) {
  reset();
  const author = data.author || 'Anonyme';

  if (data.media) {
    const { type, url } = data.media;

    if (type === 'video' || type === 'gif') {
      const vid = document.createElement('video');
      vid.src = url; vid.autoplay = true; vid.loop = true;
      vid.muted = false; vid.volume = 0.85; vid.playsInline = true;
      vid.style.cssText = 'width:100%;max-height:520px;object-fit:contain;display:block;';
      mediaEl.appendChild(vid);
      mediaEl.appendChild(makeAuthorBar(data));
      mediaEl.classList.remove('hidden');
      if (!data.caption) mediaEl.classList.add('rounded');
      vid.play().catch(() => { vid.muted = true; vid.play(); });

    } else if (type === 'image') {
      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = 'width:100%;max-height:520px;object-fit:contain;display:block;';
      mediaEl.appendChild(img);
      mediaEl.appendChild(makeAuthorBar(data));
      mediaEl.classList.remove('hidden');
      if (!data.caption) mediaEl.classList.add('rounded');

    } else if (type === 'audio') {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(url);
      currentAudio.volume = 0.85;
      currentAudio.play().catch(() => {});
      audioName.textContent = author;
      audioEl.classList.remove('hidden');
    }
  }

  if (data.caption) {
    capAuthor.textContent = author;
    capText.textContent = data.caption;
    captionEl.classList.remove('hidden');
    if (!data.media) captionEl.classList.add('standalone');
  }

  if (!data.media && !data.caption) return;

  // Mode texte seul → centré au milieu de l'écran
  const wrap = document.getElementById('lc-wrap');
  if (!data.media && data.caption) {
    wrap.classList.add('text-mode');
  } else {
    wrap.classList.remove('text-mode');
  }

  requestAnimationFrame(() => card.classList.add('show'));
}

function makeAuthorBar(data) {
  const bar = document.createElement('div');
  bar.className = 'author-bar';
  const av = document.createElement('div');
  av.className = 'author-avatar';
  if (data.avatarUrl) {
    const img = document.createElement('img');
    img.src = data.avatarUrl;
    img.onerror = () => { av.textContent = (data.author||'?').charAt(0).toUpperCase(); };
    av.appendChild(img);
  } else {
    av.textContent = (data.author||'?').charAt(0).toUpperCase();
  }
  const nm = document.createElement('div');
  nm.className = 'author-name';
  nm.textContent = data.author || 'Anonyme';
  bar.appendChild(av);
  bar.appendChild(nm);
  return bar;
}

function reset() {
  card.classList.remove('show', 'hide');
  mediaEl.innerHTML = '';
  mediaEl.classList.add('hidden');
  mediaEl.classList.remove('rounded');
  audioEl.classList.add('hidden');
  captionEl.classList.add('hidden');
  captionEl.classList.remove('standalone');
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

function hideCard() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  card.classList.remove('show');
  card.classList.add('hide');
  setTimeout(() => { reset(); }, 300);
}
</script>
</body>
</html>
