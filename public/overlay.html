<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>LiveChat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 1920px;
  height: 1080px;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', Arial, sans-serif;
}
#lc-wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 1920px;
  height: 1080px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  pointer-events: none;
}
#lc-wrap.text-mode {
  justify-content: flex-end;
  padding-bottom: 80px;
  text-align: center;
}
#lc-card {
  max-width: 1920px;
  max-height: 1080px;
  width: auto;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 50px rgba(0,0,0,0.85), 0 0 0 1.5px rgba(255,255,255,0.08);
  opacity: 0;
  transform: translateY(20px) scale(0.97);
  transition: opacity 0.3s cubic-bezier(0.34,1.56,0.64,1), transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
#lc-wrap.text-mode #lc-card {
  box-shadow: none;
  border-radius: 0;
  overflow: visible;
  width: 1400px;
}
/* Quand vidéo plein écran, le caption passe par dessus */
#lc-caption.over-media {
  position: absolute;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  background: transparent;
  padding: 0 40px;
  z-index: 10;
}
#lc-card.show { opacity:1; transform:translateY(0) scale(1); }
#lc-card.hide { opacity:0; transform:translateY(-12px) scale(0.97); transition: opacity 0.25s ease, transform 0.25s ease; }

#lc-media {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  background: transparent;
}
#lc-media.hidden { display: none; }
#lc-media img, #lc-media video {
  max-width: 1920px;
  max-height: 1080px;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
  background: transparent;
  border-radius: 16px;
}

/* Ancré au coin de la vidéo/image elle-même : positionné dynamiquement en JS
   pour chevaucher la bordure réelle du média (qui peut être plus petit que
   l'écran). Placé hors de #lc-card pour ne pas être rogné par son overflow:hidden. */
#lc-authorbar-wrap {
  position: absolute;
  z-index: 20;
}

.author-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  border-radius: 50px;
  padding: 0;
}
.author-avatar {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: 3px solid transparent;
  background-clip: padding-box;
  box-shadow: 0 0 0 3px #9147ff;
  flex-shrink: 0;
  background: linear-gradient(135deg,#9147ff,#ff6b9d);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  color: white;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 3px #9147ff, 0 0 14px 6px rgba(145,71,255,0.8), 0 0 35px 10px rgba(145,71,255,0.5);
}
.author-avatar img {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.author-name {
  font-size: 22px;
  font-weight: 900;
  color: white;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.9), 0 0 15px rgba(0,0,0,0.8);
}

#lc-audio {
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(10,10,15,0.92);
  border-radius: 16px;
}
#lc-audio.hidden { display: none; }
.audio-icon { font-size: 28px; animation: beat 0.6s ease-in-out infinite alternate; }
@keyframes beat { from{transform:scale(1)} to{transform:scale(1.18)} }
.audio-bar { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.audio-bar-fill { height:100%; background:linear-gradient(90deg,#9147ff,#ff6b9d); border-radius:4px; animation:wave 1.8s ease-in-out infinite; }
@keyframes wave { 0%{width:15%} 50%{width:85%} 100%{width:15%} }
.audio-name { font-size:13px; font-weight:700; color:rgba(255,255,255,0.7); }

#lc-caption {
  padding: 10px 4px 0px;
  background: transparent;
  border-radius: 0;
  text-align: center;
}
#lc-caption.hidden { display: none; }
#lc-caption.standalone {
  background: transparent;
  border-radius: 0;
  padding: 0;
  text-align: center;
  width: 100%;
}
.cap-author { font-size: 12px; font-weight: 700; color: #9147ff; margin-bottom: 5px; }
.cap-text {
  font-size: 46px;
  font-weight: 900;
  color: #fff;
  line-height: 1.35;
  word-break: break-word;
  text-shadow:
    3px 3px 0px #000, -3px -3px 0px #000, 3px -3px 0px #000, -3px 3px 0px #000,
    3px 0px 0px #000, -3px 0px 0px #000, 0px 3px 0px #000, 0px -3px 0px #000,
    0 0 12px #000, 0 0 25px #000, 0 0 40px rgba(0,0,0,0.9);
}
/* Texte plus grand quand il y a un média (over-media) */
#lc-caption.over-media .cap-text {
  font-size: 60px;
  text-shadow:
    4px 4px 0px #000, -4px -4px 0px #000, 4px -4px 0px #000, -4px 4px 0px #000,
    4px 0px 0px #000, -4px 0px 0px #000, 0px 4px 0px #000, 0px -4px 0px #000,
    0 0 15px #000, 0 0 30px #000, 0 0 50px rgba(0,0,0,0.95);
}
#lc-caption.standalone .cap-author { display: none; }
#lc-caption.standalone .cap-text {
  font-size: 64px;
  letter-spacing: 0.5px;
  text-shadow:
    4px 4px 0px #000, -4px -4px 0px #000, 4px -4px 0px #000, -4px 4px 0px #000,
    4px 0px 0px #000, -4px 0px 0px #000, 0px 4px 0px #000, 0px -4px 0px #000,
    0 0 15px #000, 0 0 35px #000, 0 0 55px rgba(0,0,0,0.95);
}
</style>
</head>
<body>
<div id="lc-wrap">
  <div id="lc-card">
    <div id="lc-audio" class="hidden">
      <div class="audio-icon">🎵</div>
      <div class="audio-bar"><div class="audio-bar-fill"></div></div>
      <div class="audio-name" id="lc-audio-name"></div>
    </div>
    <div id="lc-media" class="hidden"></div>
  </div>
  <div id="lc-authorbar-wrap"></div>
  <div id="lc-caption" class="hidden">
    <div class="cap-author" id="cap-author"></div>
    <div class="cap-text" id="cap-text"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const myName = params.get('name') || 'stream';

const card      = document.getElementById('lc-card');
const mediaEl   = document.getElementById('lc-media');
const audioEl   = document.getElementById('lc-audio');
const captionEl = document.getElementById('lc-caption');
const capAuthor = document.getElementById('cap-author');
const capText   = document.getElementById('cap-text');
const authorbarWrap = document.getElementById('lc-authorbar-wrap');
const audioName = document.getElementById('lc-audio-name');

let currentAudio = null;
let autoHideTimer = null;
const queue = [];
let isBusy = false;

const socket = io();
socket.on('connect', () => socket.emit('register', myName));
socket.on('livechat', (data) => { queue.push(data); tryNext(); });
socket.on('skip', () => finishCurrent());

function tryNext() {
  if (isBusy || queue.length === 0) return;
  isBusy = true;
  showLiveChat(queue.shift());
}

function finishCurrent() {
  if (autoHideTimer) { clearTimeout(autoHideTimer); autoHideTimer = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  card.classList.remove('show');
  card.classList.add('hide');
  setTimeout(() => { reset(); isBusy = false; tryNext(); }, 300);
}

function scheduleAutoHide(ms) {
  if (autoHideTimer) clearTimeout(autoHideTimer);
  autoHideTimer = setTimeout(() => finishCurrent(), ms);
}

// Seuil (en px) à partir duquel on considère que le média occupe toute la hauteur
// de l'écran (1080) et qu'il n'y a donc plus de place pour le texte en dessous.
const FULL_HEIGHT_THRESHOLD = 1075;

function isFullHeightMedia(el) {
  return el.offsetHeight >= FULL_HEIGHT_THRESHOLD;
}

// Décale le badge pour qu'il chevauche le coin réel de la vidéo/image
// (pas le coin de l'écran). Le badge est en dehors de #lc-card pour ne
// pas être rogné par son overflow:hidden.
const BADGE_BORDER_OVERLAP = 16;

function positionAuthorBadge() {
  const wrapEl = document.getElementById('lc-wrap');
  const mediaRect = mediaEl.getBoundingClientRect();
  const wrapRect = wrapEl.getBoundingClientRect();
  authorbarWrap.style.left = (mediaRect.left - wrapRect.left - BADGE_BORDER_OVERLAP) + 'px';
  authorbarWrap.style.top  = (mediaRect.top  - wrapRect.top  - BADGE_BORDER_OVERLAP) + 'px';
}

function showLiveChat(data) {
  reset();
  const author = data.anonymous ? 'Anonyme' : (data.author || 'Anonyme');

  // Applique le caption soit en dessous du média (par défaut), soit en
  // overlay par dessus le média si celui-ci occupe toute la hauteur (1080px).
  // Le nom d'auteur n'est jamais affiché sous le texte : juste le texte.
  function placeCaption(overlay) {
    if (!data.caption) return;
    capText.textContent = data.caption;
    capAuthor.style.display = 'none';
    captionEl.classList.remove('hidden');
    if (overlay) {
      captionEl.classList.add('over-media');
    } else {
      captionEl.classList.remove('over-media');
    }
  }

  if (data.media) {
    const { type, url } = data.media;

    if (type === 'video' || type === 'gif') {
      const vid = document.createElement('video');
      vid.src = url; vid.autoplay = false; vid.loop = false;
      vid.muted = true; vid.volume = 0.85; vid.playsInline = true;
      vid.style.cssText = 'max-width:1920px;max-height:1080px;width:auto;height:auto;object-fit:contain;display:block;background:transparent;';
      vid.onended = () => finishCurrent();
      vid.oncanplaythrough = () => {
        vid.muted = false;
        vid.play().catch(() => {});
        placeCaption(isFullHeightMedia(vid));
        if (!data.anonymous) {
          authorbarWrap.appendChild(makeAuthorBar(data, author));
          positionAuthorBadge();
        }
        if (!card.classList.contains('show')) requestAnimationFrame(() => card.classList.add('show'));
      };
      mediaEl.appendChild(vid);
      mediaEl.classList.remove('hidden');
      vid.load();

    } else if (type === 'image') {
      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = 'max-width:1920px;max-height:1080px;width:auto;height:auto;object-fit:contain;display:block;background:transparent;';
      mediaEl.appendChild(img);
      mediaEl.classList.remove('hidden');
      img.onload = () => {
        placeCaption(isFullHeightMedia(img));
        if (!data.anonymous) {
          authorbarWrap.appendChild(makeAuthorBar(data, author));
          positionAuthorBadge();
        }
        if (!card.classList.contains('show')) requestAnimationFrame(() => card.classList.add('show'));
      };

    } else if (type === 'audio') {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(url);
      currentAudio.volume = 0.85;
      currentAudio.play().catch(() => {});
      // Pas de média visuel à proprement parler : le texte reste en dessous.
      placeCaption(false);
    }
  }

  if (!data.media && data.caption) {
    placeCaption(false);
    captionEl.classList.add('standalone');
  }

  if (!data.media && !data.caption) return;

  // Mode texte seul → centré au milieu de l'écran
  const wrap = document.getElementById('lc-wrap');
  if (!data.media && data.caption) {
    wrap.classList.add('text-mode');
  } else {
    wrap.classList.remove('text-mode');
  }

  // Pour image et audio → affiche direct. Pour vidéo → géré par oncanplaythrough.
  // Pour image, on attend aussi onload (géré ci-dessus) avant d'afficher.
  const isVideo = data.media && (data.media.type === 'video' || data.media.type === 'gif');
  const isImage = data.media && data.media.type === 'image';
  if (!isVideo && !isImage) requestAnimationFrame(() => card.classList.add('show'));
}

function makeAuthorBar(data, author) {
  author = author || data.author || 'Anonyme';
  const bar = document.createElement('div');
  bar.className = 'author-bar';
  const av = document.createElement('div');
  av.className = 'author-avatar';
  if (data.avatarUrl) {
    const img = document.createElement('img');
    img.src = data.avatarUrl;
    img.onerror = () => { av.textContent = (data.author||'?').charAt(0).toUpperCase(); };
    av.appendChild(img);
  } else {
    av.textContent = (data.author||'?').charAt(0).toUpperCase();
  }
  const nm = document.createElement('div');
  nm.className = 'author-name';
  nm.textContent = (data.author || 'Anonyme').toUpperCase();
  bar.appendChild(av);
  bar.appendChild(nm);
  return bar;
}

function reset() {
  if (autoHideTimer) { clearTimeout(autoHideTimer); autoHideTimer = null; }
  card.classList.remove('show', 'hide');
  mediaEl.innerHTML = '';
  mediaEl.classList.add('hidden');
  authorbarWrap.innerHTML = '';
  audioEl.classList.add('hidden');
  captionEl.classList.add('hidden');
  captionEl.classList.remove('standalone', 'over-media');
  capAuthor.style.display = 'none';
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

// hideCard remplacée par finishCurrent
</script>
</body>
</html>
